name: meshdrop
description: "MeshDrop — Cross-platform peer-to-peer file transfer. AirDrop for everyone."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Secure key storage (iOS Keychain, Android Keystore, OS credential managers)
  flutter_secure_storage: ^9.2.4

  # Cryptography: X25519 key exchange, Ed25519 signing, ChaCha20-Poly1305 AEAD
  cryptography: ^2.7.0

  # mDNS/DNS-SD discovery (cross-platform NSD)
  nsd: ^5.0.1

  # Native OS transfer progress notifications
  flutter_local_notifications: ^18.0.1

  # Resolves platform-specific download/temp directories
  path_provider: ^2.1.5

  # Unique IDs for transfers, sessions, chunks
  uuid: ^4.5.1

  # SHA-256 integrity checksums for file chunks
  crypto: ^3.0.6

  # File path utilities (basename, extension, join)
  path: ^1.9.0

  # Native OS file picker dialog (Windows, Android, iOS, Linux)
  file_picker: ^8.1.2

  # Persist AppSettings (download directory, auto-accept, chunk size)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Riverpod code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
